
- name: Konfiguracja Apache
  hosts: webservers
  become: true

  tasks:
    - name: Aktualizacja cache apt
      apt:
        update_cache: true

    - name: Instalacja Apache
      apt:
        name: apache2
        state: present
      

    - name: Uruchomienie Apache
      service:
        name: apache2
        state: started
        enabled: true

    - name: Podmiana pliku index.html
      copy:
        src: files/index.html
        dest: /var/www/html/index.html
        mode: '0644'
